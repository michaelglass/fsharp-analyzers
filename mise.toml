[tools]
dotnet = "10.0"

[tasks.restore]
run = "dotnet restore"

[tasks.tool-restore]
run = "dotnet tool restore"

[tasks.build]
run = "dotnet build MichaelGlass.FSharp.Analyzers.slnx"
depends = ["restore"]

[tasks.test]
run = """
for proj in $(find tests -name '*.Tests.fsproj' | sort); do
  project_name=$(basename "$(dirname "$proj")" | sed 's/\\.Tests$//')
  echo "Testing $proj (coverage -> coverage/$project_name/)"
  dotnet test --project "$proj" \
    --coverage \
    --coverage-output-format cobertura \
    --coverage-output "$PWD/coverage/$project_name/coverage.cobertura.xml"
done
"""
depends = ["build"]

[tasks.coverage-check]
run = """
for config in coverage-ratchet-*.json; do
  [ -f "$config" ] || continue
  project="${config#coverage-ratchet-}"; project="${project%.json}"
  echo "Checking $project..."
  (cd "coverage/$project" && dotnet tool run coverageratchet check "../../$config")
done
"""
depends = ["test"]

[tasks.coverage-ratchet]
run = """
for config in coverage-ratchet-*.json; do
  [ -f "$config" ] || continue
  project="${config#coverage-ratchet-}"; project="${project%.json}"
  echo "Ratcheting $project..."
  (cd "coverage/$project" && dotnet tool run coverageratchet ratchet "../../$config")
done
"""
depends = ["test"]

[tasks.format]
description = "Format with Fantomas"
run = "dotnet fantomas src/ tests/"
depends = ["tool-restore"]

[tasks.format-check]
run = "dotnet fantomas src/ tests/ --check"
depends = ["tool-restore"]

[tasks.lint]
description = "Run FSharpLint"
run = "dotnet fsharplint lint MichaelGlass.FSharp.Analyzers.slnx"
depends = ["build", "tool-restore"]

[tasks.lint-project]
run = "dotnet tool run fsprojlint"
depends = ["tool-restore"]

[tasks.check]
description = "Run all checks with auto-fix"
depends = ["format", "lint", "lint-project", "build", "test", "coverage-check", "docs"]

[tasks.ci]
description = "Run all CI checks (no auto-fix)"
depends = ["format-check", "lint", "lint-project", "build", "test", "coverage-check", "docs"]

[tasks.docs]
description = "Generate API documentation"
run = "dotnet fsdocs build --output output/docs --clean"
depends = ["build", "tool-restore"]

[tasks.docs-watch]
run = "dotnet fsdocs watch"
depends = ["build", "tool-restore"]

[tasks.pack]
description = "Create NuGet packages"
run = "dotnet pack src/MichaelGlass.FSharp.Analyzers/MichaelGlass.FSharp.Analyzers.fsproj -c Release -o artifacts/"
depends = ["build"]

[tasks.release]
run = "dotnet tool run fssemantictagger release"
depends = ["tool-restore"]

[tasks.release-alpha]
run = "dotnet tool run fssemantictagger alpha"
depends = ["tool-restore"]
