name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    uses: michaelglass/MichaelsWackyFsPackageTools/.github/workflows/michaels-wacky-build.yml@main
    with:
      solution: MichaelGlass.FSharp.Analyzers.slnx
      fantomas-paths: "src/ tests/"
      example-projects: "none"
    permissions:
      contents: read
      checks: write
      pull-requests: write

  lint-project:
    uses: michaelglass/MichaelsWackyFsPackageTools/.github/workflows/michaels-wacky-lint-project.yml@main
    permissions:
      contents: read
